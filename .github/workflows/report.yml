name: Generate Report

on:
  workflow_run:
    workflows: ["Enrich List"]
    types:
      - completed
  
  push:
    paths:
      - 'awesome-lock.json'
      - 'readme.template'
  
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install awelist
        run: go install github.com/0xmzn/awelist/cmd/awelist@latest
        env:
          GOPROXY: direct

      - name: Generate Report
        run: awelist report